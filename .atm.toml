[core]
default_team = "atm-dev"
identity = "team-lead"

[plugins.gh_monitor]
team = "atm-dev"
repo = "randlee/agent-team-mail"
notify_target = ["quality-mgr@atm-dev", "team-lead@atm-dev"]

[plugins.atm-agent-mcp]
codex_bin = "codex"
identity = "arch-ctm"
sandbox = "workspace-write"
approval_policy = "on-failure"

# ── rmux: tmux session launcher ──────────────────────────────────────
[rmux]
session = "atm-dev"

[[rmux.windows]]
name = "agents"
layout = "even-horizontal"

[[rmux.windows.panes]]
name = "team-lead"
command = "sonnet"
env = { ATM_IDENTITY = "team-lead", ATM_TEAM = "atm-dev" }

[[rmux.windows.panes]]
name = "arch-ctm"
command = "codex --yolo"
env = { ATM_IDENTITY = "arch-ctm", ATM_TEAM = "atm-dev" }

[[rmux.windows]]
name = "monitoring"
layout = "even-vertical"

[[rmux.windows.panes]]
name = "logs"
command = "tail -f /tmp/atm.log"
