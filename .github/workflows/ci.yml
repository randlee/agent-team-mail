name: CI

on:
  pull_request:
    branches: [develop, main, "integrate/*"]
  push:
    branches: [develop, main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-clippy-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-clippy-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  gh-boundary:
    name: gh-boundary (ubuntu)
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce ARCH-BOUNDARY-001
        run: bash scripts/ci/gh_boundary_check.sh

  manifest-validation:
    name: manifest-validation (ubuntu)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate manifest completeness
        run: |
          python3 scripts/release_artifacts.py validate-manifest \
            --manifest release/publish-artifacts.toml \
            --workspace-toml Cargo.toml

      - name: Validate preflight_check assignments
        run: |
          python3 scripts/release_artifacts.py validate-preflight-checks \
            --manifest release/publish-artifacts.toml \
            --workspace-toml Cargo.toml

  parity-contract:
    name: parity-contract (${{ matrix.os }})
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-parity-contract-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-parity-contract-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-parity-contract-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run parity contract fixtures
        run: cargo test -p agent-team-mail-mcp --test parity_contract -- --nocapture

  parity-adapter:
    name: parity-adapter (${{ matrix.os }})
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-parity-adapter-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-parity-adapter-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-parity-adapter-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run parity adapter goldens
        run: cargo test -p agent-team-mail-tui parity_adapter_fixture_golden_scenarios -- --nocapture

  parity-render:
    name: parity-render (${{ matrix.os }})
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-parity-render-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-parity-render-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-parity-render-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run parity renderer snapshots
        run: cargo test -p agent-team-mail-tui parity_render_fixture_combined_flow -- --nocapture

  mcp-inspector-smoke:
    name: mcp-inspector-smoke (ubuntu)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run MCP Inspector smoke script
        run: ./scripts/ci/mcp_inspector_smoke.sh

  cli-publishability:
    name: cli-publishability (ubuntu)
    needs: [clippy]
    # Skip in regular push/PR CI: co-versioned workspace crates depend on a new
    # core version that is not yet on crates.io pre-release. Publishability is
    # validated in release-preflight/release workflows where ordering is handled.
    if: ${{ !((github.event_name == 'pull_request' && (github.base_ref == 'develop' || github.base_ref == 'main' || startsWith(github.base_ref, 'integrate/'))) || (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'))) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate CLI package
        run: cargo package -p agent-team-mail --locked --no-verify

      - name: Validate CLI publish dry-run
        run: cargo publish -p agent-team-mail --dry-run --locked --no-verify

      - name: Validate sc-compose package
        run: cargo package -p sc-compose --locked --no-verify

      - name: Validate sc-compose publish dry-run
        run: cargo publish -p sc-compose --dry-run --locked --no-verify

      - name: Simulate publish failure (must be non-zero)
        shell: bash
        run: |
          set -euo pipefail
          set +e
          cargo publish -p does-not-exist --dry-run --locked >/tmp/publish-failure.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            echo "Expected non-zero status for intentional publish failure" >&2
            cat /tmp/publish-failure.log >&2
            exit 1
          fi
          echo "Intentional publish failure returned non-zero as required."

      - name: Ensure release workflow does not mask publish failures
        run: |
          if rg -n "cargo publish .*\\|\\|" .github/workflows/release.yml; then
            echo "Release workflow masks publish failure; remove '||' fallbacks." >&2
            exit 1
          fi

  test:
    # `cli-publishability` is intentionally skipped in regular PR/push CI; keep
    # test matrix independent so integration tests still run on every PR.
    needs: [clippy, gh-boundary, manifest-validation, parity-contract, parity-adapter, parity-render, mcp-inspector-smoke]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install pytest (hook script tests)
        run: python -m pip install --upgrade pip pytest

      - name: Run hook script Python tests
        run: python -m pytest tests/hook-scripts/ -q
